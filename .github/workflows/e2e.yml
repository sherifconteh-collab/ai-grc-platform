name: E2E (Playwright)

# Manual-only for now to keep CI minutes low; flip to `pull_request` once
# the spec set is stable (see PR-8 sequencing in RELEASE_NOTES).
on:
  workflow_dispatch:
    inputs:
      spec:
        description: 'Optional spec filter (e.g. e2e/download.spec.ts). Leave blank for all.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.PLAYWRIGHT_BASE_URL || 'http://localhost:3000' }}
        run: |
          if [ -n "${{ inputs.spec }}" ]; then
            npx playwright test "${{ inputs.spec }}"
          else
            npx playwright test
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
