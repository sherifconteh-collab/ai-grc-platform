name: Build & Release Desktop App

# Trigger when a version tag is pushed, a GitHub Release is created,
# a PR is merged to main, or manually.
on:
  push:
    tags:
      - 'v*'           # e.g. v2.1.0, v2.2.0-beta.1
    branches:
      - main           # auto-release when a PR is merged
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to create a release for (e.g. v2.1.0). Leave blank to upload as workflow artifacts only.'
        required: false
        default: ''
      upload_artifact:
        description: 'Upload installer as a workflow artifact (for testing)?'
        required: false
        default: 'true'

# Cancel in-flight runs for the same branch/tag so a quick follow-up push
# doesn't produce duplicate release builds.
concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

# Default: read-only token.  The upload job needs write access to attach assets
# to the Release, so that job overrides permissions explicitly.
permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Gate: decide whether a release is needed (push-to-main only)
  # ────────────────────────────────────────────────────────────────────────────
  check-release:
    name: Check if release needed
    runs-on: ubuntu-latest
    # Only run the gate on push-to-main; for tags / releases / dispatch the
    # build jobs should always execute.
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compare package version to existing tags
        id: check
        run: |
          VERSION=$(node -p "require('./electron/package.json').version")
          TAG="v${VERSION}"
          echo "Detected version: ${VERSION} → tag: ${TAG}"

          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists — skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${TAG} does not exist — will create release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"

  # ────────────────────────────────────────────────────────────────────────────
  # Build Windows installer (.exe)
  # ────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows Installer (.exe)
    runs-on: windows-latest
    timeout-minutes: 30
    needs: [check-release]
    # Run when: (a) check-release said yes, (b) check-release was skipped
    # because the trigger wasn't push-to-main (tag / release / dispatch).
    if: |
      always() && (
        (needs.check-release.result == 'success' && needs.check-release.outputs.should_release == 'true') ||
        needs.check-release.result == 'skipped'
      )

    permissions:
      contents: write   # needed to upload release assets

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Backend ─────────────────────────────────────────────────────────────
      - name: Install backend dependencies
        run: npm ci --prefer-offline
        working-directory: backend

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci --prefer-offline
        working-directory: frontend

      - name: Build Next.js frontend (standalone)
        run: npm run build
        working-directory: frontend
        env:
          # Point rewrites at the local backend so the standalone bundle is
          # self-contained (no external service dependency at build time).
          BACKEND_ORIGIN: http://localhost:3001
          NEXT_TELEMETRY_DISABLED: 1

      # ── Electron ─────────────────────────────────────────────────────────────
      - name: Install Electron dependencies
        # Do not use --prefer-offline: embedded-postgres downloads platform-specific
        # PostgreSQL binaries (~100 MB) that will not be in the npm cache.
        run: npm ci
        working-directory: electron

      - name: Generate placeholder icons (if not present)
        run: node scripts/generate-icons.js
        working-directory: electron

      - name: Validate Windows signing secrets
        id: check-cert
        if: >-
          github.event_name == 'release'
          || startsWith(github.ref, 'refs/tags/v')
          || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
          || needs.check-release.outputs.should_release == 'true'
        env:
          WIN_CERT_B64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WIN_CERT_PASS: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: bash
        run: |
          if [ -z "$WIN_CERT_B64" ] || [ -z "$WIN_CERT_PASS" ]; then
            echo "::warning::Windows Authenticode signing secrets are not configured. The installer will be built unsigned."
            echo "has_cert=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_cert=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare Windows signing certificate
        if: >-
          steps.check-cert.outputs.has_cert == 'true' && (
          github.event_name == 'release'
          || startsWith(github.ref, 'refs/tags/v')
          || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
          || needs.check-release.outputs.should_release == 'true'
          )
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP 'controlweave-signing.p12'
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String('${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}'))
          "CSC_LINK=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CSC_KEY_PASSWORD=${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows installer
        run: npm run dist:win
        working-directory: electron
        env:
          # electron-builder uses GH_TOKEN to publish directly to GitHub Releases
          # when the workflow is triggered by a release event.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate latest.yml Windows artifact reference
        shell: bash
        run: node electron/scripts/validate-latest-yml.js

      - name: Smoke-test Windows build
        timeout-minutes: 3
        shell: pwsh
        run: |
          # Use the unpacked build directly — the NSIS assisted installer
          # (oneClick=false, perMachine=false) ignores the /D= directory
          # override in silent mode, so we cannot reliably control where it
          # installs.  The win-unpacked directory is the same content the
          # installer would lay down.
          $exePath = Join-Path 'electron' 'dist' 'win-unpacked' 'ControlWeave.exe'
          if (-not (Test-Path $exePath)) {
            throw "ControlWeave.exe not found at $exePath after build."
          }

          $process = Start-Process -FilePath $exePath -ArgumentList '--smoke-test' -PassThru
          $process | Wait-Process -Timeout 120 -ErrorAction SilentlyContinue

          if (-not $process.HasExited) {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            throw "Smoke test timed out after 120 seconds — the application likely hung during startup."
          }

          if ($process.ExitCode -ne 0) {
            throw "Smoke test failed with exit code $($process.ExitCode)."
          }

      - name: Verify Windows installer Authenticode signature
        if: >-
          steps.check-cert.outputs.has_cert == 'true' && (
          github.event_name == 'release'
          || startsWith(github.ref, 'refs/tags/v')
          || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
          || needs.check-release.outputs.should_release == 'true'
          )
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path electron/dist -Filter 'ControlWeave.Setup.*.exe' | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            throw 'Windows installer not found for signature verification.'
          }

          $signature = Get-AuthenticodeSignature -FilePath $installer.FullName
          if ($signature.Status -ne 'Valid') {
            throw "Installer signature validation failed: $($signature.Status)"
          }

      # ── Publish ──────────────────────────────────────────────────────────────
      - name: Upload installer to GitHub Release
        if: >-
          github.event_name == 'release'
          || startsWith(github.ref, 'refs/tags/v')
          || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
          || needs.check-release.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-release.outputs.version || github.event.inputs.version || github.ref_name }}
          name: ${{ needs.check-release.outputs.version || github.event.inputs.version || github.ref_name }}
          draft: false
          prerelease: false
          files: |
            electron/dist/*.exe
            electron/dist/*.blockmap
            electron/dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer as workflow artifact
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.upload_artifact == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: controlweave-windows-installer
          path: |
            electron/dist/*.exe
          retention-days: 14

  # ────────────────────────────────────────────────────────────────────────────
  # Build macOS DMG
  # ────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS Installer (.dmg)
    runs-on: macos-latest
    timeout-minutes: 20
    needs: [check-release]
    if: |
      always() && (
        (needs.check-release.result == 'success' && needs.check-release.outputs.should_release == 'true') ||
        needs.check-release.result == 'skipped'
      )

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: npm ci --prefer-offline
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci --prefer-offline
        working-directory: frontend

      - name: Build Next.js frontend (standalone)
        run: npm run build
        working-directory: frontend
        env:
          BACKEND_ORIGIN: http://localhost:3001
          NEXT_TELEMETRY_DISABLED: 1

      - name: Install Electron dependencies
        # Do not use --prefer-offline: embedded-postgres downloads platform-specific
        # PostgreSQL binaries (~100 MB) that will not be in the npm cache.
        run: npm ci
        working-directory: electron

      - name: Generate placeholder icons (if not present)
        run: node scripts/generate-icons.js
        working-directory: electron

      - name: Build macOS installer
        run: npm run dist:mac
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke-test macOS build
        timeout-minutes: 3
        shell: bash
        run: |
          app_bins=()
          while IFS= read -r line; do
            app_bins+=("$line")
          done < <(find electron/dist -path '*/ControlWeave.app/Contents/MacOS/ControlWeave' -type f | sort)
          if [ ${#app_bins[@]} -eq 0 ]; then
            echo "No ControlWeave.app binary found under electron/dist" >&2
            exit 1
          fi

          for app_bin in "${app_bins[@]}"; do
            echo "Smoke testing $app_bin"
            "$app_bin" --smoke-test
          done

      - name: Upload DMG to GitHub Release
        if: >-
          github.event_name == 'release'
          || startsWith(github.ref, 'refs/tags/v')
          || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
          || needs.check-release.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-release.outputs.version || github.event.inputs.version || github.ref_name }}
          name: ${{ needs.check-release.outputs.version || github.event.inputs.version || github.ref_name }}
          draft: false
          prerelease: false
          files: |
            electron/dist/*.dmg
            electron/dist/*.blockmap
            electron/dist/latest-mac.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG as workflow artifact
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.upload_artifact == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: controlweave-macos-installer
          path: |
            electron/dist/*.dmg
          retention-days: 14

  # ────────────────────────────────────────────────────────────────────────────
  # Build Linux AppImage
  # ────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux AppImage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [check-release]
    if: |
      always() && (
        (needs.check-release.result == 'success' && needs.check-release.outputs.should_release == 'true') ||
        needs.check-release.result == 'skipped'
      )

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: npm ci --prefer-offline
        working-directory: backend

      - name: Install frontend dependencies
        run: npm ci --prefer-offline
        working-directory: frontend

      - name: Build Next.js frontend (standalone)
        run: npm run build
        working-directory: frontend
        env:
          BACKEND_ORIGIN: http://localhost:3001
          NEXT_TELEMETRY_DISABLED: 1

      - name: Install Electron dependencies
        # Do not use --prefer-offline: embedded-postgres downloads platform-specific
        # PostgreSQL binaries (~100 MB) that will not be in the npm cache.
        run: npm ci
        working-directory: electron

      - name: Generate placeholder icons (if not present)
        run: node scripts/generate-icons.js
        working-directory: electron

      - name: Build Linux AppImage
        run: npm run dist:linux
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke-test Linux build
        timeout-minutes: 3
        shell: bash
        run: |
          shopt -s nullglob
          appimages=(electron/dist/*.AppImage)
          if [ ${#appimages[@]} -eq 0 ]; then
            echo "No AppImage found under electron/dist" >&2
            exit 1
          fi

          for appimage in "${appimages[@]}"; do
            echo "Smoke testing $appimage"
            chmod +x "$appimage"
            APPIMAGE_EXTRACT_AND_RUN=1 xvfb-run -a --server-args='-screen 0 1280x720x24' \
              "$appimage" --no-sandbox --disable-gpu --smoke-test
          done

      - name: Upload AppImage to GitHub Release
        if: >-
          github.event_name == 'release'
          || startsWith(github.ref, 'refs/tags/v')
          || (github.event_name == 'workflow_dispatch' && github.event.inputs.version != '')
          || needs.check-release.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-release.outputs.version || github.event.inputs.version || github.ref_name }}
          name: ${{ needs.check-release.outputs.version || github.event.inputs.version || github.ref_name }}
          draft: false
          prerelease: false
          files: |
            electron/dist/*.AppImage
            electron/dist/latest-linux.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload AppImage as workflow artifact
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.upload_artifact == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: controlweave-linux-appimage
          path: |
            electron/dist/*.AppImage
          retention-days: 14
