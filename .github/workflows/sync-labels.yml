name: Sync Labels

on:
  push:
    branches: [main]
    paths:
      - '.github/labels.yml'
  workflow_dispatch:

permissions:
  contents: read   # required for actions/checkout — a top-level `permissions:`
                   # block replaces the default token scope entirely rather than
                   # adding to it, and this workflow's only recorded run ever
                   # failed at the Checkout step without contents: read here
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const yaml = require('js-yaml');

            let labels;
            try {
              labels = yaml.load(fs.readFileSync('.github/labels.yml', 'utf8'));
            } catch (e) {
              console.log('YAML parse failed, using fallback parser:', e.message);
              // Fallback: parse simple YAML manually
              const content = fs.readFileSync('.github/labels.yml', 'utf8');
              labels = [];
              let current = null;
              for (const line of content.split('\n')) {
                const nameMatch = line.match(/^- name:\s*"([^"]+)"/);
                const colorMatch = line.match(/^\s+color:\s*"([^"]+)"/);
                const descMatch = line.match(/^\s+description:\s*"([^"]+)"/);
                if (nameMatch) {
                  current = { name: nameMatch[1] };
                  labels.push(current);
                } else if (colorMatch && current) {
                  current.color = colorMatch[1];
                } else if (descMatch && current) {
                  current.description = descMatch[1];
                }
              }
            }

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
                // Label exists — update it
                await github.rest.issues.updateLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description
                });
                console.log(`✅ Updated: ${label.name}`);
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                  console.log(`🆕 Created: ${label.name}`);
                } else {
                  console.log(`⚠️ Error with ${label.name}: ${e.message}`);
                }
              }
            }

            console.log(`\n✅ Synced ${labels.length} labels`);
