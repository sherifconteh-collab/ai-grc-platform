name: SBOM & AIBOM Generation

# Triggers:
#   • Every push to main (i.e. every PR merge) – uploads as workflow artifacts
#   • Every published GitHub Release         – additionally attaches to the release
on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read   # default read-only for generate jobs; write is granted per-job below

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1 – Software Bill of Materials (CycloneDX JSON, npm deps)
  # Satisfies NIST SP 800-160 SA-12 and NTIA minimum SBOM elements.
  # ─────────────────────────────────────────────────────────────────────────
  generate-sbom:
    name: Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Install CycloneDX npm tool
        run: npm install -g @cyclonedx/cyclonedx-npm

      - name: Install backend dependencies
        run: cd backend && npm ci --ignore-scripts

      - name: Install frontend dependencies
        run: cd frontend && npm ci --ignore-scripts

      - name: Generate backend SBOM
        run: |
          mkdir -p sbom-output
          cyclonedx-npm \
            --package-lock-only \
            --output-format JSON \
            --output-file sbom-output/sbom-backend.cdx.json \
            backend/package.json
          echo "✅ Backend SBOM generated"

      - name: Generate frontend SBOM
        run: |
          cyclonedx-npm \
            --package-lock-only \
            --ignore-npm-errors \
            --output-format JSON \
            --output-file sbom-output/sbom-frontend.cdx.json \
            frontend/package.json
          echo "✅ Frontend SBOM generated"

      - name: Show SBOM component counts
        run: |
          python3 - <<'PYEOF'
          import json, glob
          for path in sorted(glob.glob("sbom-output/sbom-*.cdx.json")):
              bom = json.load(open(path))
              label = path.split("/")[-1].replace(".cdx.json", "")
              comps = bom.get("components", [])
              print(f"  {label}: {len(comps)} components")
          PYEOF

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom-output/sbom-*.cdx.json
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2 – AI Bill of Materials (CycloneDX JSON with ML model components)
  # Documents every AI provider/model the platform can integrate with.
  # Format: CycloneDX 1.6 with `machine-learning-model` component type and
  # `modelCard` metadata per NIST AI RMF and EU AI Act documentation needs.
  # ─────────────────────────────────────────────────────────────────────────
  generate-aibom:
    name: Generate AIBOM (CycloneDX + AI Model Inventory)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Build AIBOM document
        run: |
          mkdir -p sbom-output
          node backend/scripts/generate-aibom.js

      - name: Upload AIBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: aibom-${{ github.sha }}
          path: sbom-output/aibom.cdx.json
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3 – Attach SBOM + AIBOM as GitHub Release assets
  # Only runs when the workflow was triggered by a published release.
  # ─────────────────────────────────────────────────────────────────────────
  attach-to-release:
    name: Attach SBOM & AIBOM to GitHub Release
    needs: [generate-sbom, generate-aibom]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to upload assets to the GitHub Release

    steps:
      - name: Download SBOM artifacts
        uses: actions/download-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: release-assets

      - name: Download AIBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: aibom-${{ github.sha }}
          path: release-assets

      - name: Upload release assets
        uses: actions/github-script@v9
        with:
          script: |
            const fs   = require('fs');
            const path = require('path');

            const releaseId = context.payload.release.id;
            const files = fs.readdirSync('release-assets').filter(f => f.endsWith('.json'));

            for (const file of files) {
              const filePath = path.join('release-assets', file);
              const data     = fs.readFileSync(filePath);

              const label = file.replace('.cdx.json', '');
              const assetName = `${label}-${{ github.event.release.tag_name }}.cdx.json`;

              console.log(`Uploading ${assetName} (${data.length} bytes)...`);
              await github.rest.repos.uploadReleaseAsset({
                owner:       context.repo.owner,
                repo:        context.repo.repo,
                release_id:  releaseId,
                name:        assetName,
                data:        data,
                headers: {
                  'Content-Type':   'application/json',
                  'Content-Length': data.length,
                },
              });
              console.log(`✅ Uploaded ${assetName}`);
            }
